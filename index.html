<script>
let provider;
let signer;
let userAddress;

async function connectWallet() {
  try {
    if (!window.ethereum) {
      alert("Wallet not found. Install MetaMask.");
      return;
    }

    // get provider safely
    const eth = window.ethereum;

    // request account
    const accounts = await eth.request({
      method: "eth_requestAccounts",
    });

    if (!accounts || accounts.length === 0) {
      alert("No account found");
      return;
    }

    provider = new ethers.providers.Web3Provider(eth, "any");
    signer = provider.getSigner();
    userAddress = accounts[0];

    document.getElementById("wallet").innerText =
      "Connected: " + userAddress;

  } catch (err) {
    console.log("ERROR:", err);

    alert("Wallet connect failed. Check MetaMask popup.");
  }
}

function createRequest() {
  let amount = document.getElementById("amount").value;
  let desc = document.getElementById("desc").value;

  if (!amount || !desc) {
    alert("Fill all fields");
    return;
  }

  let request = {
    amount: amount,
    description: desc,
    address: userAddress
  };

  let encoded = btoa(JSON.stringify(request));
  let link = window.location.origin + "?data=" + encoded;

  document.getElementById("result").innerHTML =
    "Share this link:<br><a href='" + link + "'>" + link + "</a>";
}
</script>
